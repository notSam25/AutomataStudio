name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages-deploy-frontend"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          if [ -f package-lock.json ] || [ -f package.json ]; then
            npm ci --production || true
          fi

      - name: Inject backend URL
        env:
          BACKEND_URL: ${{ secrets.BACKEND_URL }}
        run: |
          if [ -n "$BACKEND_URL" ]; then
            echo "window.__API_BASE__ = '$BACKEND_URL';" > frontend/config.js
            echo "Injected BACKEND_URL from secrets"
          else
            echo "window.__API_BASE__ = 'http://localhost:5000/api';" > frontend/config.js
            echo "No BACKEND_URL secret set; using localhost fallback"
          fi

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload frontend artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './frontend/'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
