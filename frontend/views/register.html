<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Register</h2>
      <p>Create an account to manage private automata projects.</p>
    </div>

    <div class="alert alert-error show" ng-show="error">{{ error }}</div>

    <form ng-submit="register()">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" ng-model="form.username" required />
      </div>

      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" ng-model="form.email" required />
      </div>

      <div class="form-group">
        <label for="password">Password (8+ chars)</label>
        <input type="password" id="password" ng-model="form.password" required />
      </div>

      <button type="submit" class="btn btn-success">Register</button>
      <a href="#!/login" class="btn btn-secondary">Back to login</a>
    </form>
  </div>
</div>
