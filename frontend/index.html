<!doctype html>
<html ng-app="automataApp" lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AutomataStudio</title>
    <meta name="theme-color" content="#ffffff" />
    <link
      rel="icon"
      type="image/svg+xml"
      href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><circle cx='50' cy='50' r='45' fill='%230b1220'/><text x='50' y='60' font-size='50' font-weight='bold' fill='white' text-anchor='middle'>A</text></svg>"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Angular and ngRoute -->
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular.min.js"></script>
    <script src="https://ajax.googleapis.com/ajax/libs/angularjs/1.8.3/angular-route.min.js"></script>
    <!-- Graph libraries -->
    <script src="https://unpkg.com/vis-network@9.1.2/dist/vis-network.min.js"></script>
    <script src="https://unpkg.com/cytoscape@3.29.2/dist/cytoscape.min.js"></script>

    <!-- Runtime config -->
    <script src="./config.js"></script>

    <!-- App Scripts -->
    <script src="./js/app.js"></script>
    <script src="./js/services/authService.js"></script>
    <script src="./js/services/automataService.js"></script>
    <script src="./js/directives/automataGraph.js"></script>
    <script src="./js/directives/automataGraphEditor.js"></script>
    <script src="./js/controllers/loginController.js"></script>
    <script src="./js/controllers/registerController.js"></script>
    <script src="./js/controllers/profileController.js"></script>
    <script src="./js/controllers/dashboardController.js"></script>
    <script src="./js/controllers/createController.js"></script>
    <script src="./js/controllers/editController.js"></script>
    <script src="./js/controllers/simulateController.js"></script>

    <!-- Styles -->
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body ng-controller="MainController">
    <header>
      <h1>AutomataStudio</h1>
      <p>Build and Simulate Automata</p>
    </header>

    <nav>
      <a ng-click="navigate('/')" style="cursor: pointer">Dashboard</a>
      <a
        ng-click="navigate('/create')"
        ng-show="auth.isAuthenticated()"
        style="cursor: pointer"
        >Create Automata</a
      >
      <a
        ng-click="navigate('/profile')"
        ng-show="auth.isAuthenticated()"
        style="cursor: pointer"
        >Profile</a
      >
      <a
        ng-click="navigate('/login')"
        ng-show="!auth.isAuthenticated()"
        style="cursor: pointer"
        >Login</a
      >
      <a
        ng-click="navigate('/register')"
        ng-show="!auth.isAuthenticated()"
        style="cursor: pointer"
        >Register</a
      >
      <a
        ng-click="logout()"
        ng-show="auth.isAuthenticated()"
        style="cursor: pointer"
        >Logout</a
      >
    </nav>

    <!-- Main content area -->
    <div ng-view></div>
  </body>
</html>
