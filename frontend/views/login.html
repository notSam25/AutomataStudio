<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Login</h2>
      <p>Sign in to create, edit, and share automata.</p>
    </div>

    <div class="alert alert-error show" ng-show="error">{{ error }}</div>

    <form ng-submit="login()">
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" ng-model="form.email" required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" ng-model="form.password" required />
      </div>

      <button type="submit" class="btn btn-success">Login</button>
      <a href="#!/register" class="btn btn-secondary">Create account</a>
    </form>
  </div>
</div>
