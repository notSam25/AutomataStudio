<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Profile</h2>
    </div>

    <div ng-show="loading" class="loading">
      <p>Loading profile...</p>
    </div>

    <div ng-show="!loading">
      <div class="alert alert-error show" ng-show="error">{{ error }}</div>
      <div class="alert alert-success show" ng-show="success">{{ success }}</div>

      <form ng-submit="save()">
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" ng-model="form.username" required />
        </div>

        <div class="form-group">
          <label for="email">Email</label>
          <input type="email" id="email" ng-model="form.email" required />
        </div>

        <hr />
        <h3>Change Password</h3>

        <div class="form-group">
          <label for="oldPassword">Old Password</label>
          <input type="password" id="oldPassword" ng-model="form.oldPassword" placeholder="Required when setting a new password" />
        </div>

        <div class="form-group">
          <label for="newPassword">New Password</label>
          <input type="password" id="newPassword" ng-model="form.newPassword" placeholder="At least 8 characters" />
        </div>

        <div class="form-group">
          <label for="confirmPassword">Confirm New Password</label>
          <input type="password" id="confirmPassword" ng-model="form.confirmPassword" />
        </div>

        <button type="submit" class="btn btn-success">Save Profile</button>
      </form>
    </div>
  </div>
</div>
