<div class="container">
  <div class="card">
    <div class="card-header">
      <h2>Edit Automata</h2>
    </div>

    <div class="alert alert-error show" ng-show="error">{{ error }}</div>
    <div class="alert alert-success show" ng-show="success">
      {{ success }}
    </div>

    <div ng-show="loading" class="loading">
      <p>Loading automata...</p>
    </div>

    <div ng-show="!loading">
      <div ng-include="'views/automata-form.html'"></div>
    </div>
  </div>
</div>
